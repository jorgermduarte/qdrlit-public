version: '3.3'
services:
  drl_mysql_server:
    image: mysql:9.2.0
    container_name: drl_mysql_tpch_database
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 16G
    restart: always
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - ./volumes/drl_mysql:/var/lib/mysql

  client_drl:
    build: .
    tty: true
    container_name: client_drl
    volumes:
      - ./agent:/project/agent
      - ./cli:/project/cli
      - ./data:/project/data
      - ./db_env:/project/db_env
      - ./shared_utils:/project/shared_utils